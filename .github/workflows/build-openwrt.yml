name: Build OpenWrt for Beryl AX
on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version"
        required: true
        default: "25.12.4"
      target:
        description: "OpenWrt target/subtarget"
        required: true
        default: "mediatek/filogic"
      profile:
        description: "Device profile"
        required: true
        default: "glinet_gl-mt3000"
      cache_epoch:
        description: "Bump this to force a fresh ImageBuilder cache"
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  build:
    name: Build sysupgrade image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      OPENWRT_VERSION: ${{ inputs.openwrt_version }}
      TARGET: ${{ inputs.target }}
      PROFILE: ${{ inputs.profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            xsltproc \
            zlib1g-dev \
            zstd

      - name: Prepare cache variables
        shell: bash
        run: |
          set -euo pipefail
          echo "TARGET_SLUG=${TARGET/\//-}" >> "$GITHUB_ENV"

      - name: Restore cached ImageBuilder
        uses: actions/cache@v4
        with:
          path: .cache/imagebuilder/${{ inputs.openwrt_version }}/${{ env.TARGET_SLUG }}
          key: imagebuilder-${{ runner.os }}-${{ inputs.openwrt_version }}-${{ env.TARGET_SLUG }}-${{ inputs.cache_epoch }}

      - name: Restore cached SDK
        uses: actions/cache@v4
        with:
          path: .cache/sdk/${{ inputs.openwrt_version }}/${{ env.TARGET_SLUG }}
          key: sdk-${{ runner.os }}-${{ inputs.openwrt_version }}-${{ env.TARGET_SLUG }}-${{ inputs.cache_epoch }}

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          # Single source of truth for the device build (shared with the private
          # site repo). Public build: no SITE_DIR, so the overlay is a no-op.
          ./scripts/build-image.sh \
            "${OPENWRT_VERSION}" "${TARGET}" "${PROFILE}" \
            "${GITHUB_WORKSPACE}/artifacts" \
            "${GITHUB_WORKSPACE}/.cache"

          echo "Release assets:"
          ls -lah artifacts

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-beryl-ax-${{ inputs.openwrt_version }}
          path: artifacts/
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse --short HEAD)"
          TARGET_SAFE="${TARGET//\//-}"

          RELEASE_TAG="openwrt-${OPENWRT_VERSION}-${TARGET_SAFE}-build-${{ github.run_number }}.${{ github.run_attempt }}"
          RELEASE_TITLE="OpenWrt ${OPENWRT_VERSION} for GL-MT3000 - build ${{ github.run_number }}.${{ github.run_attempt }}"

          cat > RELEASE_NOTES.md <<EOF
          # ${RELEASE_TITLE}

          Automated OpenWrt build for the GL.iNet Beryl AX / GL-MT3000.

          ## Build metadata

          - OpenWrt version: \`${OPENWRT_VERSION}\`
          - Target: \`${TARGET}\`
          - Profile: \`${PROFILE}\`
          - Commit: \`${SHORT_SHA}\`
          - Workflow run: \`${{ github.run_number }}\`
          - Run attempt: \`${{ github.run_attempt }}\`

          ## Flashing note

          Use the \`*sysupgrade.bin\` image for upgrading an existing OpenWrt installation.

          When migrating from GL.iNet firmware to vanilla OpenWrt, flash carefully, use Ethernet, and do not keep vendor settings.
          EOF

          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Release tag: ${RELEASE_TAG}"

          gh repo view "${GITHUB_REPOSITORY}" --json nameWithOwner,url

          gh release create "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_TITLE}" \
            --notes-file RELEASE_NOTES.md \
            --latest

          echo "Uploading assets..."

          find artifacts -maxdepth 1 -type f -print0 | sort -z | while IFS= read -r -d '' file; do
            echo "Uploading ${file}"
            gh release upload "${RELEASE_TAG}" "${file}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          done

  validate:
    name: Validate image (static + QEMU)
    needs: build
    runs-on: ubuntu-latest

    env:
      OPENWRT_VERSION: ${{ inputs.openwrt_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pip \
            qemu-efi-aarch64 \
            qemu-system-arm \
            qemu-utils \
            rsync \
            unzip \
            wget \
            xsltproc \
            zlib1g-dev \
            zstd
          pip3 install --break-system-packages pexpect

      - name: Download built firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-beryl-ax-${{ inputs.openwrt_version }}
          path: artifacts

      - name: Static validation of the real Beryl AX image
        run: ./scripts/validate-static.sh artifacts

      - name: Build equivalent QEMU-bootable image
        run: ./scripts/build-qemu-image.sh "${OPENWRT_VERSION}" qemu-build

      - name: QEMU boot smoke test
        run: ./scripts/run-qemu-test.py qemu-build/openwrt-armsr-qemu.img
